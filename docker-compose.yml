services:
  backend:
    build: .
    container_name: openshorts-backend
    ports:
      - "18000:8000"
    volumes:
      - ./cookies.txt:/app/cookies.txt:ro
      - openshorts_uploads:/app/uploads
      - openshorts_output:/app/output
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: openshorts-frontend
    ports:
      - "5175:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend

  renderer:
    build:
      context: .
      dockerfile: render-service/Dockerfile
    container_name: openshorts-renderer
    ports:
      - "3100:3100"
    volumes:
      - openshorts_output:/output
    environment:
      - REMOTION_BUNDLE_PATH=/app/remotion
      - OUTPUT_DIR=/output
      - PORT=3100
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  openshorts_output:
  openshorts_uploads:
